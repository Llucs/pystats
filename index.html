<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>pystats - Estatísticas de Pacotes PyPI</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="header">
      <div class="header-inner">
        <a href="/" class="header-logo">
          <span class="logo-icon">pS</span>
          <span class="logo-text">pystats</span>
        </a>
        <a href="https://github.com/Llucs/pystats" target="_blank" rel="noopener noreferrer" class="header-github" title="Repositório no GitHub">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/>
          </svg>
        </a>
      </div>
    </header>

    <main class="main">
      <section class="hero">
        <h1 class="hero-title">Py<span class="highlight">Stats</span></h1>
        <p class="hero-subtitle">Estatísticas reais de downloads e informações de pacotes Python do PyPI</p>
        <form class="search-form" id="searchForm">
          <div class="search-wrapper">
            <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
            </svg>
            <input type="text" class="search-input" id="searchInput" placeholder="Ex: requests, django, flask, numpy..." autofocus autocomplete="off" spellcheck="false" />
            <button type="submit" class="search-button" id="searchBtn">
              <span id="searchBtnText">Pesquisar</span>
              <span id="searchBtnSpinner" class="button-spinner hidden"></span>
            </button>
          </div>
        </form>
        <div class="suggestions" id="suggestions"></div>
      </section>

      <div id="loading" class="loading-container hidden">
        <div class="loading-spinner"></div>
        <p>Buscando dados do pacote...</p>
      </div>

      <div id="error" class="error-container hidden"></div>

      <div id="results" class="results hidden"></div>

      <div id="empty" class="empty-state">
        <div class="empty-icon">
          <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/><path d="M11 8v6"/><path d="M8 11h6"/>
          </svg>
        </div>
        <h2>Pesquise um pacote</h2>
        <p>Digite o nome de qualquer pacote Python para ver estatísticas reais de downloads</p>
      </div>
    </main>

    <footer class="credits">
      <div class="credits-inner">
        <div class="credits-info">
          <span class="credits-name">pystats</span>
          <span class="credits-separator">•</span>
          <span class="credits-text">Desenvolvido por <strong>Llucs</strong></span>
          <span class="credits-separator">•</span>
          <span class="credits-text"><span id="versionDisplay"></span></span>
        </div>
        <a href="https://github.com/Llucs/pystats" target="_blank" rel="noopener noreferrer" class="credits-button">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/>
          </svg>
          Repositório no GitHub
        </a>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
